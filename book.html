<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>书籍下载</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f6f2;
      --panel: #ffffff;
      --text: #1e2526;
      --muted: #697070;
      --line: #d9ddd6;
      --accent: #2f6f62;
      --soft: #edf4f1;
      --shadow: 0 18px 50px rgba(29, 38, 37, .10);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121715;
        --panel: #1b211f;
        --text: #edf2ef;
        --muted: #a8b3ae;
        --line: #33403b;
        --accent: #77c7b5;
        --soft: #22322d;
        --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(47,111,98,.10), transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel) 68%, var(--bg)) 0%, var(--bg) 100%);
      color: var(--text);
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 18px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      letter-spacing: 0;
    }
    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .home {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--panel);
      white-space: nowrap;
    }
    .tools {
      display: grid;
      grid-template-columns: minmax(180px, 280px) 1fr;
      gap: 10px;
      margin: 18px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      box-shadow: var(--shadow);
      position: sticky;
      top: 10px;
      z-index: 2;
    }
    input, select {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .book {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .book-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--soft) 58%, transparent);
    }
    .book h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      letter-spacing: 0;
      word-break: break-word;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .files {
      display: grid;
      gap: 8px;
      padding: 12px;
    }
    .file {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: color-mix(in srgb, var(--panel) 86%, var(--soft));
    }
    .file:hover { border-color: var(--accent); }
    .type {
      color: var(--accent);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 13px;
    }
    .name {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }
    .size {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .empty {
      display: none;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }
    @media (max-width: 820px) {
      .shell { padding: 26px 12px 42px; }
      .topbar { display: block; }
      .home { display: inline-block; margin-top: 14px; }
      .tools { grid-template-columns: 1fr; position: static; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .file { grid-template-columns: 52px 1fr; }
      .size { grid-column: 2; }
    }
  </style>
</head>

      ] }
    ];

    const grid = document.getElementById('bookGrid');
    const search = document.getElementById('search');
    const category = document.getElementById('category');
    const empty = document.getElementById('empty');

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function renderCategories() {
      const categories = [...new Set(books.map(book => book.category))];
      category.innerHTML += categories.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const selected = category.value;
      const visible = books.filter(book => {
        const categoryMatch = !selected || book.category === selected;
        const text = [book.category, book.title, ...book.files.flatMap(file => [file.name, file.type])].join(' ').toLowerCase();
        return categoryMatch && (!q || text.includes(q));
      });

      grid.innerHTML = visible.map(book => `
        <article class="book">
          <div class="book-head">
            <h2>${escapeHtml(book.title)}</h2>
            <div class="meta">${escapeHtml(book.category)} · ${book.files.length} 个文件</div>
          </div>
          <div class="files">
            ${book.files.map(file => `
              <a class="file" href="${encodeURI(file.href)}" download>
                <span class="type">${escapeHtml(file.type)}</span>
                <span class="name">${escapeHtml(file.name)}</span>
                <span class="size">${escapeHtml(file.size)}</span>
              </a>
            `).join('')}
          </div>
        </article>
      `).join('');
      empty.style.display = visible.length ? 'none' : 'block';
    }

    renderCategories();
    render();
    search.addEventListener('input', render);
    category.addEventListener('change', render);
  </script>
