<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>读经计划</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f6f2;
      --panel: #ffffff;
      --text: #1e2526;
      --muted: #697070;
      --line: #d9ddd6;
      --accent: #2f6f62;
      --accent-2: #9a5936;
      --soft: #edf4f1;
      --warn: #fff4df;
      --shadow: 0 18px 50px rgba(29, 38, 37, .10);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121715;
        --panel: #1b211f;
        --text: #edf2ef;
        --muted: #a8b3ae;
        --line: #33403b;
        --accent: #77c7b5;
        --accent-2: #e0a06d;
        --soft: #22322d;
        --warn: #2f2618;
        --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(47,111,98,.10), transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel) 68%, var(--bg)) 0%, var(--bg) 100%);
      color: var(--text);
    }
    .shell { max-width: 1120px; margin: 0 auto; padding: 34px 18px 56px; }
    header { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin-bottom: 22px; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 46px); font-weight: 750; letter-spacing: 0; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 15px; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 240px) 1fr auto;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 10px;
      z-index: 2;
    }
    input, select, button {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 0 12px;
    }
    @media (prefers-color-scheme: dark) {
      .toolbar { background: rgba(27, 33, 31, .82); }
      input, select, button { background: #202824; }
    }
    button { cursor: pointer; font-weight: 650; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .quick { display: flex; gap: 8px; }
    .quick button { padding: 0 14px; }
    .grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 16px; margin-top: 18px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .panel-title { margin: 0; font-size: 20px; font-weight: 750; }
    .date-pill { background: var(--soft); color: var(--accent); padding: 6px 10px; border-radius: 999px; font-weight: 700; font-size: 14px; }
    .tasks { padding: 0; display: grid; gap: 0; }
    .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
    }
    .task-top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; margin-bottom: 10px; }
    .book { font-weight: 750; font-size: 17px; }
    .sheet { color: var(--muted); font-size: 13px; }
    .task-list { display: grid; gap: 8px; }
    .row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; align-items: start; }
    .label { color: var(--muted); font-size: 13px; padding-top: 2px; }
    .value { line-height: 1.55; word-break: break-word; }
    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--soft);
      border-radius: 8px;
    }
    .mini-card {
      margin: 14px;
      padding: 16px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      width: calc(100% - 28px);
    }
    .mini-card h3 { margin: 0 0 10px; font-size: 16px; color: var(--text); }
    .memory-card { background: var(--warn); border-color: color-mix(in srgb, var(--accent-2) 46%, var(--line)); }
    .memory-item { padding: 10px 0; border-top: 1px solid color-mix(in srgb, var(--accent-2) 30%, transparent); }
    .memory-item:first-of-type { border-top: 0; padding-top: 0; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; }
    .card-meta span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      font-weight: 650;
    }
    .card-meta span + span::before {
      content: "·";
      margin-right: 8px;
      color: var(--line);
    }
    .timeline {
      --day-row-height: 58px;
      padding: 10px 14px 14px;
      max-height: calc(var(--day-row-height) * 7 + 24px);
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .day {
      width: 100%;
      min-height: var(--day-row-height);
      display: grid;
      grid-template-columns: 122px 1fr;
      gap: 10px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      text-align: left;
      padding: 10px 4px;
    }
    .day:hover { background: var(--soft); }
    .day.active { background: #e4eee9; }
    .day-date { font-weight: 750; color: var(--accent); white-space: nowrap; }
    .day-text { color: var(--muted); font-size: 13px; line-height: 1.4; }
    mark { background: #ffe7a7; padding: 0 2px; border-radius: 3px; }
    @media (max-width: 820px) {
      header { display: block; }
      .toolbar { grid-template-columns: 1fr; position: static; }
      .quick { display: grid; grid-template-columns: repeat(3, 1fr); }
      .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 76px 1fr; }
    }
    @media (max-width: 560px) {
      .shell { padding: 22px 10px 36px; }
      h1 { font-size: 30px; }
      .subtitle { font-size: 14px; }
      .toolbar { padding: 10px; gap: 8px; }
      input, button { height: 40px; font-size: 14px; }
      .panel-head { padding: 14px 12px 12px; align-items: flex-start; }
      .panel-title { font-size: 18px; }
      .date-pill { font-size: 13px; }
      .tasks { padding: 0; }
      .mini-card { margin: 10px; padding: 12px; width: calc(100% - 20px); }
      .row { grid-template-columns: 64px 1fr; gap: 8px; }
      .timeline {
        --day-row-height: 64px;
        padding: 8px 10px 12px;
        max-height: calc(var(--day-row-height) * 7 + 20px);
        overflow-y: auto;
      }
      .day { grid-template-columns: 1fr; gap: 4px; padding: 12px 6px; }
    }
  </style>
</head>

  <div class="shell">
    <header>
      <div>
        <h1>读经计划</h1>

      </div>

        <div class="tasks" id="tasks"></div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">日期索引</h2>
          <span class="date-pill" id="resultCount"></span>
        </div>
        <div class="timeline" id="timeline"></div>
      </aside>
    </main>
  </div>

    const searchInput = document.getElementById('searchInput');
    const tasksEl = document.getElementById('tasks');
    const memoryBox = document.getElementById('memoryBox');
    const timelineEl = document.getElementById('timeline');
    const resultCount = document.getElementById('resultCount');
    const selectedDateLabel = document.getElementById('selectedDateLabel');

    function localISO(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    function addDays(iso, days) {
      const d = new Date(`${iso}T12:00:00`);
      d.setDate(d.getDate() + days);
      return localISO(d);
    }
    function formatDate(iso) {
      const d = new Date(`${iso}T12:00:00`);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }
    function compactDate(iso) {
      const d = new Date(`${iso}T12:00:00`);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }
    function esc(text) {
      return String(text ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function hasWork(item) {
      return item.mainPages || item.epubSection || item.overview || item.bibleReading || item.memory || item.note;
    }
    function summary(item) {
      const parts = [];
      if (item.mainPages) parts.push(`${item.mainBook} ${item.mainPages}`);
      if (item.overview) parts.push(item.overview);
      if (item.bibleReading) parts.push(`看 ${item.bibleReading}`);
      if (item.memory) parts.push(`背 ${item.memory}`);
      return parts.join('；') || '/';
    }
    function row(label, value) {
      return `<div class="row"><div class="label">${esc(label)}</div><div class="value">${esc(value || '/')}</div></div>`;
    }
    function renderTasks() {
      const iso = dateInput.value;
      const list = byDate.get(iso) || [];
      selectedDateLabel.textContent = formatDate(iso);
      const memories = list.filter(x => x.memory).map(x => ({sheet: x.sheet, memory: x.memory}));
      memoryBox.innerHTML = memories.length
        ? `<div class="mini-card memory-card"><h3>今日背诵</h3>${memories.map(x => `<div class="memory-item"><strong>${esc(x.memory)}</strong></div>`).join('')}</div>`
        : '';
      tasksEl.innerHTML = list.length ? list.map(item => `
        <article class="mini-card reading-card">
          <h3>今日阅读</h3>
          <div class="card-meta">
            <span>${esc(item.sheet || '/')}</span>
            <span>${esc(item.mainBook || '/')}</span>
          </div>
          <div class="task-list">
            ${row('书籍阅读', [item.mainPages, item.epubSection].filter(Boolean).join(' · '))}
            ${row('概论书籍', item.overview)}
            ${row('看', item.bibleReading)}
            ${row('备注', item.note)}
          </div>
        </article>
      `).join('') : '<div class="empty">不在计划范围内。</div>';
      renderTimeline();
    }
    function renderTimeline() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = dates.filter(date => {
        if (!q) return true;
        return byDate.get(date).some(item => JSON.stringify(item).toLowerCase().includes(q));
      });
      resultCount.textContent = `${filtered.length} 天`;
      timelineEl.innerHTML = filtered.map(date => {
        const text = byDate.get(date).map(summary).join(' ｜ ');
        return `<button type="button" class="day ${date === dateInput.value ? 'active' : ''}" data-date="${date}">
          <span class="day-date">${compactDate(date)}</span>
          <span class="day-text">${esc(text)}</span>
        </button>`;
      }).join('') || '<div class="empty">没有匹配的日期。</div>';
      timelineEl.querySelectorAll('.day').forEach(btn => {
        btn.addEventListener('click', () => {
          dateInput.value = btn.dataset.date;
          renderTasks();
        });
      });
    }
    dateInput.min = dates[0] || '';
    dateInput.max = dates[dates.length - 1] || '';
    dateInput.value = byDate.has(localISO()) ? localISO() : (dates.find(d => d >= localISO()) || dates[dates.length - 1] || localISO());
    dateInput.addEventListener('change', renderTasks);
    searchInput.addEventListener('input', renderTimeline);
    document.getElementById('todayBtn').addEventListener('click', () => { dateInput.value = localISO(); renderTasks(); });
    document.getElementById('prevBtn').addEventListener('click', () => { dateInput.value = addDays(dateInput.value, -1); renderTasks(); });
    document.getElementById('nextBtn').addEventListener('click', () => { dateInput.value = addDays(dateInput.value, 1); renderTasks(); });
    renderTasks();
  </script>
</body>
</html>
