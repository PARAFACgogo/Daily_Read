<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Read</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f6f2;
      --panel: #ffffff;
      --text: #1e2526;
      --muted: #697070;
      --line: #d9ddd6;
      --accent: #2f6f62;
      --soft: #edf4f1;
      --shadow: 0 18px 50px rgba(29, 38, 37, .10);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121715;
        --panel: #1b211f;
        --text: #edf2ef;
        --muted: #a8b3ae;
        --line: #33403b;
        --accent: #77c7b5;
        --soft: #22322d;
        --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(47,111,98,.10), transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel) 68%, var(--bg)) 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 56px 18px;
    }
    header { margin-bottom: 28px; }
    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 56px);
      letter-spacing: 0;
      line-height: 1.08;
    }
    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }
    .entries {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    a.card {
      display: block;
      min-height: 190px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform .18s ease, border-color .18s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--soft);
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 18px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }
    @media (max-width: 680px) {
      main { padding: 34px 12px; }
      .entries { grid-template-columns: 1fr; }
      a.card { min-height: 150px; padding: 20px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Daily Read</h1>
      <p class="subtitle">选择要打开的功能：查看每日计划，或按书卷下载阅读书籍。</p>
    </header>
    <section class="entries" aria-label="入口">
      <a class="card" href="plan.html">
        <span class="label">读</span>
        <h2>计划查看</h2>
        <p>查看当天阅读、背诵内容，并按日期查询完整计划。</p>
      </a>
      <a class="card" href="book.html">
        <span class="label">书</span>
        <h2>书籍下载</h2>
        <p>按参考书和书卷分类下载 PDF、EPUB 阅读文件。</p>
      </a>
    </section>
  </main>
</body>
</html>
